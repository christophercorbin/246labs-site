version: 1
applications:
  - appRoot: web
    frontend:
      phases:
        preBuild:
          commands:
            - npm ci
        build:
          commands:
            # Amplify injects app env vars into the build container only; persist
            # the SES_* vars to .env.production so the SSR compute runtime sees them.
            - env | grep -E '^SES_' >> .env.production
            - npm run build
      artifacts:
        baseDirectory: .next
        files:
          - "**/*"
      cache:
        paths:
          - node_modules/**/*
          - .next/cache/**/*
